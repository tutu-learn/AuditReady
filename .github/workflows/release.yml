name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            binary: auditready
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: auditready.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: zip
            binary: auditready
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: zip
            binary: auditready

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl toolchain (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin auditready
        env:
          # Cross-link C dependencies (vendored OpenSSL) with musl-gcc.
          CC_x86_64_unknown_linux_musl: musl-gcc

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Prepare package directory
        shell: bash
        run: |
          mkdir -p dist/auditready
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/auditready/
          cp appsettings.json dist/auditready/appsettings.example.json
          cp LICENSE dist/auditready/ 2>/dev/null || true

      - name: Package as tar.gz (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cp scripts/install.sh dist/auditready/
          cp scripts/restart.sh dist/auditready/
          cp scripts/update.sh dist/auditready/
          cd dist
          tar czf auditready-${{ matrix.target }}.tar.gz auditready
          mv auditready-${{ matrix.target }}.tar.gz ../

      - name: Package as zip (Windows/macOS)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: |
          cd dist
          7z a ../auditready-${{ matrix.target }}.zip auditready

      - name: Build Windows MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          cargo install cargo-wix
          cargo wix -p auditready --no-build --target ${{ matrix.target }} --output auditready-${{ matrix.target }}.msi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auditready-${{ matrix.target }}
          path: |
            auditready-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release tag and name
        id: release
        run: |
          TAG="nightly-$(date +"%Y-%m-%d-%H%M%S")"
          NAME="Nightly Build $(date +"%Y-%m-%d %H:%M:%S")"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: auditready-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
